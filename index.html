l<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FOUNDRY // RapidQuote</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-shell">
        <header class="header">
            <span class="brand">FOUNDRY // QUOTE</span>
            <span class="status">LIVE_SESSION</span>
        </header>

        <main class="workspace">
            <div class="surface info-card">
                <input type="text" placeholder="Project Name (e.g. Smith Kitchen)" class="ghost-input">
                <input type="text" placeholder="Client Email" class="ghost-input">
            </div>

            <div class="surface scope-card">
                <span class="s-label">SELECT_SCOPE</span>
                <div class="scope-grid">
                    <button class="chip active">Painting</button>
                    <button class="chip">Flooring</button>
                    <button class="chip">Electrical</button>
                    <button class="chip">Drywall</button>
                </div>
            </div>

            <div class="surface input-card">
                <span class="s-label">MEASUREMENTS (SQ_FT)</span>
                <div class="calc-row">
                    <input type="number" value="150" class="num-input">
                    <span class="unit">SQFT</span>
                </div>
            </div>

            <div class="surface summary-card">
                <div class="summary-header">
                    <span class="s-label">ESTIMATED_BID</span>
                    <span class="bid-total">$1,240.00</span>
                </div>
                <p class="summary-meta">Includes 20% labor overhead and premium materials.</p>
            </div>

            <button class="btn-manifest">MANIFEST & SEND BID</button>
        </main>
    </div>

</body>
</html>
