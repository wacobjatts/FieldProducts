<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FOUNDRY // Project Manifest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-shell">
        <header class="header">
            <span>FOUNDRY // MASTER_MANIFEST</span>
            <span class="status-tag">UPLINK_READY</span>
        </header>

        <div class="surface progress-container">
            <div class="progress-label">
                <span>SUBSTRATE_COMPLETION</span>
                <span id="completion-perc">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
            </div>
        </div>

        <section class="surface">
            <span class="label">PHASE_01 // SCOPE_OF_WORK</span>
            <select id="scope-select" onchange="Foundry.updateProgress()">
                <option value="0">Select Scope...</option>
                <option value="25">Initial Surface Prep</option>
                <option value="50">Technical Installation</option>
                <option value="75">Core Refinement</option>
                <option value="100">Final Manifestation</option>
            </select>
        </section>

        <section class="surface">
            <span class="label">BREAKDOWN // ALLOCATION</span>
            <div class="line-item-list" id="line-items">
                <div class="item"><span>Labor: Site Logistics</span><span>$1,200.00</span></div>
                <div class="item"><span>Labor: Technical Build</span><span>$2,850.00</span></div>
                <div class="item"><span>Materials: Premium Substrate</span><span>$950.00</span></div>
            </div>
        </section>

        <section class="surface">
            <span class="label">SITE_EVIDENCE</span>
            <div class="photo-box" onclick="document.getElementById('f-upload').click()">
                <input type="file" id="f-upload" hidden accept="image/*">
                TAP_TO_CAPTURE_NODE
            </div>
        </section>

        <section class="surface bid-card">
            <span class="label">FINAL_VALUATION</span>
            <div class="bid-total" id="final-total">$5,000.00</div>
            <div class="summary-line"><span>Tax/Surcharge (10%)</span><span>$500.00</span></div>
        </section>

        <div class="action-stack">
            <button class="btn-secondary" onclick="Foundry.uplink()">UPLINK_OFFICE</button>
            <button class="btn-primary" onclick="window.print()">CLIENT_PDF</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
