<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FOUNDRY // Realtime Bid</title>
    <style>
        :root {
            --bg: #0b0e14;
            --panel: rgba(20, 24, 33, 0.8);
            --border: #2d333b;
            --purple: #bf7af0;
            --blue: #47a1ff;
            --text: #adbac7;
            --white: #ffffff;
        }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* ABLY/CURSOR GLOWS */
        .glow-bg {
            position: fixed; top: -10%; right: -10%; width: 50%; height: 50%;
            background: radial-gradient(circle, rgba(191,122,240,0.1) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
        }

        .app-shell { padding: 24px; max-width: 500px; margin: auto; }

        /* HUD HEADER */
        .os-header { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 30px; font-family: monospace; font-size: 10px; letter-spacing: 1px; }
        .hud-status { color: var(--purple); text-shadow: 0 0 10px var(--purple); }

        /* FLOATING CARDS */
        .fr-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-label { font-size: 10px; color: var(--purple); font-weight: 800; text-transform: uppercase; margin-bottom: 15px; display: block; }

        /* GHOST CURSOR SIMULATION */
        .cursor-ghost {
            position: absolute; top: 40px; right: 20px; width: 14px; height: 14px;
            background: var(--blue); clip-path: polygon(0 0, 0% 100%, 30% 70%, 100% 70%);
            animation: moveCursor 8s infinite ease-in-out;
        }
        @keyframes moveCursor { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-100px, 40px); } }

        /* INPUT STYLE */
        input, select, textarea {
            background: rgba(0,0,0,0.2); border: 1px solid var(--border);
            color: var(--white); padding: 12px; width: 100%; border-radius: 8px; margin-top: 8px;
            font-size: 14px; transition: 0.3s;
        }
        input:focus { border-color: var(--purple); outline: none; box-shadow: 0 0 15px rgba(191,122,240,0.2); }

        /* LINE ITEMS */
        .line-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .item-name { font-weight: 500; color: var(--white); }
        .item-val { color: var(--blue); font-family: monospace; }

        /* DYNAMIC BID TOTAL */
        .bid-total-wrap { text-align: center; margin-top: 20px; }
        .total-val { font-size: 48px; font-weight: 900; color: var(--white); letter-spacing: -2px; margin: 10px 0; }

        /* NAV BAR */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(20,24,33,0.9); border: 1px solid var(--border);
            border-radius: 40px; padding: 15px; display: flex; justify-content: space-around;
            backdrop-filter: blur(20px);
        }
        .nav-item { color: var(--text); font-size: 10px; text-decoration: none; text-align: center; }
        .nav-item.active { color: var(--purple); }

        @media print {
            body { background: white; color: black; }
            .no-print, .bottom-nav, .glow-bg { display: none; }
            .fr-card { border: 1px solid #eee; box-shadow: none; }
            .total-val { color: black; }
        }
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <div class="app-shell">
        <header class="os-header">
            <span>FIELD_OS // PRO_ALPHA</span>
            <span class="hud-status">● REALTIME_SYNC</span>
        </header>

        <div class="fr-card" style="position: relative;">
            <div class="cursor-ghost no-print"></div>
            <span class="card-label">01 // PROJECT_CORE</span>
            <input type="text" placeholder="Project Name" value="Luxury Suite Refinement">
            <input type="text" placeholder="Client Node ID" value="User_9921">
        </div>

        <div class="fr-card">
            <span class="card-label">02 // SCOPE_BREAKDOWN</span>
            <div id="line-items">
                <div class="line-item">
                    <span class="item-name">Initial Substrate Prep</span>
                    <span class="item-val">$1,250.00</span>
                </div>
                <div class="line-item">
                    <span class="item-name">Technical Foundry Install</span>
                    <span class="item-val">$3,800.00</span>
                </div>
            </div>
            <button class="no-print" style="width:100%; background:transparent; border:1px dashed var(--border); color:var(--dim); padding:10px; margin-top:15px; border-radius:8px; cursor:pointer;" onclick="App.addItem()">+ ADD_LINE_ITEM</button>
        </div>

        <div class="bid-total-wrap">
            <span class="card-label">TOTAL_VALUATION</span>
            <div class="total-val" id="total-val">$5,050.00</div>
            <p style="font-size: 11px; color: var(--dim);">Estimated via Realtime FieldRate Engine</p>
        </div>

        <div style="display:none;" class="print-only">
            <p>Authorized Signature: _______________________</p>
        </div>
    </div>

    <nav class="bottom-nav no-print">
        <a href="#" class="nav-item active">●<br>HOME</a>
        <a href="#" class="nav-item">▣<br>INBOX</a>
        <a href="#" class="nav-item">◮<br>EXPLORE</a>
        <a href="#" class="nav-item" onclick="window.print()">⎙<br>PDF</a>
    </nav>

    <script>
        const App = {
            addItem() {
                const name = prompt("Enter Item Name:");
                const cost = prompt("Enter Cost:");
                if(name && cost) {
                    const container = document.getElementById('line-items');
                    const div = document.createElement('div');
                    div.className = 'line-item';
                    div.innerHTML = `<span class="item-name">${name}</span><span class="item-val">$${parseFloat(cost).toLocaleString()}</span>`;
                    container.appendChild(div);
                    this.updateTotal(parseFloat(cost));
                }
            },
            updateTotal(newVal) {
                const el = document.getElementById('total-val');
                let current = parseFloat(el.innerText.replace('$', '').replace(',', ''));
                el.innerText = `$${(current + newVal).toLocaleString(undefined, {minimumFractionDigits:2})}`;
            }
        };
    </script>
</body>
</html>
