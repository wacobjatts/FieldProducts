<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FOUNDRY // FieldCapture</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-shell">
        <header class="header">
            <span class="brand">FOUNDRY // FIELD_SYNC</span>
            <div class="sync-status"><span class="dot pulse"></span> UPLINK_READY</div>
        </header>

        <main class="workspace">
            <section class="tool-section">
                <span class="label">VISUAL_EVIDENCE</span>
                <div class="surface photo-card" onclick="document.getElementById('photo-input').click()">
                    <input type="file" id="photo-input" hidden accept="image/*" onchange="Foundry.preview(this)">
                    <div id="photo-preview" class="photo-placeholder">
                        <span class="icon">⊞</span>
                        <p>TAP_TO_CAPTURE_SITE_PHOTO</p>
                    </div>
                </div>
            </section>

            <section class="tool-section">
                <span class="label">SUBSTRATE_DATA</span>
                <div class="surface card-dark">
                    <div class="measure-grid">
                        <div class="m-box">
                            <label>SQ_FT</label>
                            <input type="number" id="dim-sqft" value="250" oninput="Foundry.calc()">
                        </div>
                        <div class="m-box">
                            <label>DIFFICULTY_MLT</label>
                            <input type="number" id="dim-diff" value="1.0" step="0.1" oninput="Foundry.calc()">
                        </div>
                    </div>
                </div>
            </section>

            <section class="tool-section">
                <span class="label">ESTIMATOR_NOTES</span>
                <div class="surface card-dark">
                    <textarea id="field-notes" placeholder="e.g. Subflooring damage detected in NW corner..."></textarea>
                </div>
            </section>

            <section class="output-section">
                <div class="surface bid-card">
                    <div class="bid-main">
                        <span class="label">PROJECTED_REVENUE</span>
                        <h2 id="final-bid">$0.00</h2>
                    </div>
                    <div class="bid-breakdown">
                        <div class="row"><span>Labor</span><span id="out-labor">$0.00</span></div>
                        <div class="row"><span>Materials</span><span id="out-mat">$0.00</span></div>
                    </div>
                </div>

                <div class="action-stack">
                    <button class="btn-secondary" onclick="Foundry.sendToOffice()">SEND_TO_OFFICE</button>
                    <button class="btn-primary" onclick="Foundry.clientApprove()">CLIENT_APPROVAL</button>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
